<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../theme.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .error-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            text-align: center;
        }

        .error-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 32px;
        }

        .error-code {
            font-size: 4rem;
            font-weight: 700;
            color: var(--color-error);
            line-height: 1;
            margin-bottom: 8px;
        }

        .error-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .error-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .error-icon {
            width: 48px;
            height: 48px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .error-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-primary {
            padding: 12px 20px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            padding: 12px 20px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: border-color 0.2s;
        }

        .btn-secondary:hover { border-color: var(--border-hover); }

        .error-ref {
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--text-faint);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">&#9888;&#65039;</div>
            <div class="error-code">500</div>
            <div class="error-title">Something Went Wrong</div>
            <div class="error-desc">An unexpected error occurred on our end. We've been notified and are looking into it.</div>
            <div class="error-actions">
                <a href="/" class="btn-primary">Go Home</a>
                <a href="javascript:location.reload()" class="btn-secondary">Try Again</a>
            </div>
            <div class="error-ref" id="errorRef"></div>
        </div>
    </div>
    <script>
        const ref = 'ERR-' + Date.now().toString(36).toUpperCase();
        document.getElementById('errorRef').textContent = 'Reference: ' + ref;
    </script>
</body>
</html>
