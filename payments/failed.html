<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../theme.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 440px; padding: 20px; text-align: center; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 32px;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--color-error);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }

        .desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .error-detail {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 0.8rem;
            color: var(--color-error);
            text-align: left;
        }

        .btn-primary {
            padding: 12px 20px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: block;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            padding: 10px 16px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: block;
            width: 100%;
            margin-top: 10px;
            transition: border-color 0.2s;
        }

        .btn-secondary:hover { border-color: var(--border-hover); }

        .help-note {
            margin-top: 16px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="error-icon">&#10007;</div>
            <h1>Payment Failed</h1>
            <div class="desc">Your payment could not be processed. No charges were made to your account.</div>

            <div class="error-detail" id="errorDetail" style="display: none;"></div>

            <a href="/checkout" class="btn-primary" id="retryLink">Try Again</a>
            <a href="/dashboard" class="btn-secondary">Back to Dashboard</a>

            <div class="help-note">
                If this keeps happening, try a different payment method or contact support.
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const reason = params.get('reason') || params.get('error');
        const errorEl = document.getElementById('errorDetail');

        if (reason) {
            errorEl.textContent = 'Reason: ' + reason;
            errorEl.style.display = 'block';
        }
    </script>
</body>
</html>
