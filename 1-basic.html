<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Basic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 32px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .logo {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 12px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-text);
        }

        .login-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input {
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .login-btn {
            padding: 12px 20px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .login-error {
            background: rgba(239, 68, 68, 0.1); /* --color-error with opacity */
            border: 1px solid var(--color-error);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--color-error);
            font-size: 0.85rem;
            display: none;
        }

        .login-error.show { display: block; }

        .tier-badge {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .tier-badge span {
            background: var(--badge-bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 4px 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">B</div>
                <h1>Sign In</h1>
                <p>Basic authentication</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="login-error" id="loginError"></div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            </form>

            <div class="tier-badge"><span>Tier 1 — Basic</span></div>
        </div>
    </div>

    <script>
        /**
         * TIER 1 — BASIC LOGIN
         *
         * Features:
         * - Username + password form
         * - Client-side required validation
         * - POST to /api/auth/login
         * - Cookie-based session (httpOnly)
         *
         * Security: Minimal — relies on server-side protection.
         * Good for: Internal tools, prototypes, dev environments.
         *
         * TODO: Set your API_BASE and redirect path below.
         */

        const API_BASE = '/api';
        const REDIRECT = '/dashboard';

        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        function showError(msg) {
            loginError.textContent = msg;
            loginError.classList.add('show');
        }

        function hideError() {
            loginError.classList.remove('show');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter username and password.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Invalid credentials.');
                    return;
                }

                // Store user info and redirect
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = REDIRECT;
            } catch (err) {
                showError('Connection error. Try again.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
