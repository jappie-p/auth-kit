<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search — Filtered</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../theme.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            padding-top: 8vh;
            -webkit-font-smoothing: antialiased;
        }

        .search-container {
            width: 100%;
            max-width: 620px;
            padding: 20px;
        }

        /* Search bar */
        .search-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.2s;
        }

        .search-bar:focus-within { border-color: var(--accent); }

        .search-bar .icon { color: var(--text-dim); font-size: 0.95rem; flex-shrink: 0; }

        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
        }

        .search-bar input::placeholder { color: var(--text-dim); }

        .search-bar .shortcut {
            font-size: 0.7rem;
            color: var(--text-faint);
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            flex-shrink: 0;
        }

        .search-bar .clear-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1rem;
            padding: 2px;
            display: none;
        }

        .search-bar .clear-btn.show { display: block; }
        .search-bar .clear-btn:hover { color: var(--text-secondary); }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .filter-chip:hover { border-color: var(--border-hover); }

        .filter-chip.active {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
        }

        /* Sort */
        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 0 4px;
        }

        .result-count {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .sort-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-family: inherit;
            padding: 4px 8px;
            cursor: pointer;
        }

        .sort-select:focus { outline: none; border-color: var(--accent); }

        /* Results */
        .search-results {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .result-card:hover { border-color: var(--border-hover); }
        .result-card.active { border-color: var(--accent); }

        .result-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .result-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .result-title mark {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent);
            border-radius: 2px;
            padding: 0 2px;
        }

        .result-type {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--badge-bg);
            color: var(--text-dim);
            border: 1px solid var(--border);
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .result-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.5;
        }

        .result-meta {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        /* Empty / loading */
        .search-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .search-loading {
            text-align: center;
            padding: 24px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Performance bar */
        .perf-bar {
            margin-top: 12px;
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: none;
            font-size: 0.7rem;
            color: var(--text-faint);
            gap: 16px;
        }

        .perf-bar.show { display: flex; }
        .perf-bar span { white-space: nowrap; }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="search-bar">
            <span class="icon">&#128270;</span>
            <input type="text" id="searchInput" placeholder="Search..." autocomplete="off" autofocus maxlength="200">
            <button class="clear-btn" id="clearBtn">&times;</button>
            <span class="shortcut" id="shortcutHint">/</span>
        </div>

        <div class="filters" id="filters">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="pages">Pages</button>
            <button class="filter-chip" data-filter="posts">Posts</button>
            <button class="filter-chip" data-filter="users">Users</button>
            <button class="filter-chip" data-filter="files">Files</button>
            <button class="filter-chip" data-filter="settings">Settings</button>
        </div>

        <div class="sort-bar" id="sortBar" style="display: none;">
            <span class="result-count" id="resultCount"></span>
            <select class="sort-select" id="sortSelect">
                <option value="relevance">Most relevant</option>
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="a-z">A &rarr; Z</option>
                <option value="z-a">Z &rarr; A</option>
            </select>
        </div>

        <div class="search-results" id="searchResults"></div>

        <div class="perf-bar" id="perfBar">
            <span id="perfTime"></span>
            <span id="perfCache"></span>
            <span id="perfTotal"></span>
        </div>
    </div>

    <script>
        /**
         * FILTERED SEARCH
         *
         * Features:
         * - Category filter chips (all, pages, posts, users, files, settings)
         * - Sort options (relevance, newest, oldest, A-Z, Z-A)
         * - Debounced input (300ms)
         * - Input sanitization
         * - Abort previous requests
         * - Result count + response time
         * - Result type badges
         * - Result metadata (date, author, etc.)
         * - Keyboard navigation (up/down/enter/escape)
         * - "/" shortcut to focus search
         * - Clear button
         * - Client-side result cache (30s TTL)
         * - Performance bar (time, cache status, total)
         *
         * Server endpoint:
         * - GET /api/search?q=query&filter=type&sort=relevance
         *   → { results: [{ id, title, description, url, type, date, author }], total }
         */

        const API_BASE = '/api';
        const MIN_QUERY = 2;
        const DEBOUNCE_MS = 300;
        const CACHE_TTL = 30000;

        const input = document.getElementById('searchInput');
        const resultsEl = document.getElementById('searchResults');
        const sortBar = document.getElementById('sortBar');
        const resultCount = document.getElementById('resultCount');
        const sortSelect = document.getElementById('sortSelect');
        const clearBtn = document.getElementById('clearBtn');
        const perfBar = document.getElementById('perfBar');
        const shortcutHint = document.getElementById('shortcutHint');

        let debounceTimer = null;
        let activeIndex = -1;
        let currentResults = [];
        let abortController = null;
        let activeFilter = 'all';
        const cache = new Map();

        // Sanitize
        function sanitize(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function highlight(text, query) {
            const safe = sanitize(text);
            const safeQ = sanitize(query);
            if (!safeQ) return safe;
            const regex = new RegExp('(' + safeQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            return safe.replace(regex, '<mark>$1</mark>');
        }

        function timeAgo(dateStr) {
            if (!dateStr) return '';
            const diff = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            if (days < 30) return days + 'd ago';
            return new Date(dateStr).toLocaleDateString();
        }

        function getCacheKey(q, filter, sort) {
            return `${q}|${filter}|${sort}`;
        }

        function showResults(results, query, time, fromCache) {
            currentResults = results;
            activeIndex = -1;

            // Update perf bar
            document.getElementById('perfTime').textContent = 'Response: ' + time + 'ms';
            document.getElementById('perfCache').textContent = fromCache ? 'Cached' : 'Fresh';
            document.getElementById('perfTotal').textContent = results.length + ' results';
            perfBar.classList.add('show');

            // Sort bar
            resultCount.textContent = results.length + ' result' + (results.length !== 1 ? 's' : '');
            sortBar.style.display = results.length ? 'flex' : 'none';

            if (!results.length) {
                resultsEl.innerHTML = '<div class="search-empty">No results found</div>';
                return;
            }

            resultsEl.innerHTML = '';
            results.forEach((r, i) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.dataset.index = i;
                card.dataset.url = r.url || '';

                let metaParts = [];
                if (r.date) metaParts.push(timeAgo(r.date));
                if (r.author) metaParts.push(sanitize(r.author));

                card.innerHTML = `
                    <div class="result-top">
                        <div class="result-title">${highlight(r.title || '', query)}</div>
                        ${r.type ? `<span class="result-type">${sanitize(r.type)}</span>` : ''}
                    </div>
                    ${r.description ? `<div class="result-desc">${sanitize(r.description)}</div>` : ''}
                    ${metaParts.length ? `<div class="result-meta">${metaParts.map(p => '<span>' + p + '</span>').join('')}</div>` : ''}
                `;

                card.addEventListener('click', () => {
                    if (r.url) window.location.href = r.url;
                });

                resultsEl.appendChild(card);
            });
        }

        function hideResults() {
            resultsEl.innerHTML = '';
            sortBar.style.display = 'none';
            perfBar.classList.remove('show');
            activeIndex = -1;
        }

        async function search(query) {
            const sort = sortSelect.value;
            const cacheKey = getCacheKey(query, activeFilter, sort);

            // Check cache
            const cached = cache.get(cacheKey);
            if (cached && Date.now() - cached.time < CACHE_TTL) {
                showResults(cached.results, query, 0, true);
                return;
            }

            if (abortController) abortController.abort();
            abortController = new AbortController();

            resultsEl.innerHTML = '<div class="search-loading">Searching...</div>';

            const start = performance.now();

            try {
                const params = new URLSearchParams({ q: query, sort });
                if (activeFilter !== 'all') params.set('filter', activeFilter);

                const res = await fetch(`${API_BASE}/search?${params}`, {
                    credentials: 'include',
                    signal: abortController.signal
                });

                const data = await res.json();
                const time = Math.round(performance.now() - start);

                cache.set(cacheKey, { results: data.results || [], time: Date.now() });

                showResults(data.results || [], query, time, false);
            } catch (err) {
                if (err.name !== 'AbortError') {
                    resultsEl.innerHTML = '<div class="search-empty">Search failed</div>';
                }
            }
        }

        function triggerSearch() {
            clearTimeout(debounceTimer);
            const q = input.value.trim();
            if (q.length < MIN_QUERY) { hideResults(); return; }
            debounceTimer = setTimeout(() => search(q), DEBOUNCE_MS);
        }

        // Input
        input.addEventListener('input', () => {
            clearBtn.classList.toggle('show', input.value.length > 0);
            shortcutHint.style.display = input.value.length > 0 ? 'none' : '';
            triggerSearch();
        });

        // Clear
        clearBtn.addEventListener('click', () => {
            input.value = '';
            clearBtn.classList.remove('show');
            shortcutHint.style.display = '';
            hideResults();
            input.focus();
        });

        // Filters
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                activeFilter = chip.dataset.filter;
                if (input.value.trim().length >= MIN_QUERY) search(input.value.trim());
            });
        });

        // Sort
        sortSelect.addEventListener('change', () => {
            if (input.value.trim().length >= MIN_QUERY) search(input.value.trim());
        });

        // Keyboard nav
        input.addEventListener('keydown', (e) => {
            const items = resultsEl.querySelectorAll('.result-card');
            if (e.key === 'ArrowDown' && items.length) {
                e.preventDefault();
                activeIndex = Math.min(activeIndex + 1, items.length - 1);
            } else if (e.key === 'ArrowUp' && items.length) {
                e.preventDefault();
                activeIndex = Math.max(activeIndex - 1, 0);
            } else if (e.key === 'Enter' && activeIndex >= 0 && items[activeIndex]) {
                e.preventDefault();
                items[activeIndex].click();
                return;
            } else if (e.key === 'Escape') {
                hideResults();
                input.blur();
                return;
            } else return;

            items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
            items[activeIndex].scrollIntoView({ block: 'nearest' });
        });

        // "/" shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== input && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                input.focus();
            }
        });
    </script>
</body>
</html>
