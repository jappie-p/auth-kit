<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Animated grid background ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.3;
            animation: gridShift 20s linear infinite;
            z-index: 0;
        }
        @keyframes gridShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* ── Radial glow overlay ── */
        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% 30%, color-mix(in srgb, var(--accent) 12%, transparent), transparent);
            z-index: 0;
            pointer-events: none;
        }

        /* ── Floating particles / stars ── */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat linear infinite;
        }
        .particle:nth-child(1)  { left: 5%;  animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(2)  { left: 12%; animation-duration: 18s; animation-delay: 2s; }
        .particle:nth-child(3)  { left: 20%; animation-duration: 14s; animation-delay: 4s; }
        .particle:nth-child(4)  { left: 30%; animation-duration: 16s; animation-delay: 1s; }
        .particle:nth-child(5)  { left: 40%; animation-duration: 20s; animation-delay: 3s; }
        .particle:nth-child(6)  { left: 50%; animation-duration: 13s; animation-delay: 5s; }
        .particle:nth-child(7)  { left: 60%; animation-duration: 17s; animation-delay: 0.5s; }
        .particle:nth-child(8)  { left: 70%; animation-duration: 15s; animation-delay: 2.5s; }
        .particle:nth-child(9)  { left: 80%; animation-duration: 19s; animation-delay: 4.5s; }
        .particle:nth-child(10) { left: 90%; animation-duration: 11s; animation-delay: 1.5s; }
        .particle:nth-child(11) { left: 15%; animation-duration: 22s; animation-delay: 6s; }
        .particle:nth-child(12) { left: 35%; animation-duration: 16s; animation-delay: 7s; }
        .particle:nth-child(13) { left: 55%; animation-duration: 21s; animation-delay: 3.5s; }
        .particle:nth-child(14) { left: 75%; animation-duration: 14s; animation-delay: 8s; }
        .particle:nth-child(15) { left: 95%; animation-duration: 18s; animation-delay: 5.5s; }
        .particle:nth-child(odd)  { width: 3px; height: 3px; }
        .particle:nth-child(3n)   { background: var(--text-muted); width: 1px; height: 1px; }

        @keyframes particleFloat {
            0%   { transform: translateY(110vh) scale(0); opacity: 0; }
            10%  { opacity: 0.8; }
            90%  { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ── Main layout ── */
        .page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            gap: 48px;
        }

        /* ── Entrance animations ── */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        .delay-4 { animation-delay: 0.55s; }
        .delay-5 { animation-delay: 0.7s; }
        .delay-6 { animation-delay: 0.85s; }
        .delay-7 { animation-delay: 1.0s; }

        /* ── Hero section ── */
        .hero {
            text-align: center;
            max-width: 680px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--badge-bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .badge .dot {
            width: 6px;
            height: 6px;
            background: var(--color-success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Gradient animated title ── */
        .title {
            font-size: clamp(40px, 8vw, 72px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
            background: linear-gradient(
                135deg,
                var(--text-primary) 0%,
                var(--accent) 25%,
                var(--text-primary) 50%,
                var(--accent) 75%,
                var(--text-primary) 100%
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 6s ease infinite;
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 0%; }
            50%  { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        .tagline {
            font-size: clamp(16px, 2.5vw, 20px);
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ── Countdown ── */
        .countdown {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .countdown-block {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            min-width: 90px;
            text-align: center;
            transition: border-color 0.3s;
        }
        .countdown-block:hover {
            border-color: var(--accent);
        }
        .countdown-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .countdown-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 6px;
        }

        /* ── Progress bar ── */
        .progress-section {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .progress-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 100px;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ── Email form ── */
        .signup-section {
            width: 100%;
            max-width: 480px;
        }
        .signup-form {
            display: flex;
            gap: 10px;
        }
        .signup-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .signup-input::placeholder {
            color: var(--text-dim);
        }
        .signup-input:focus {
            border-color: var(--accent);
        }
        .signup-input.error {
            border-color: var(--color-error);
        }
        .signup-btn {
            padding: 12px 24px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.15s;
        }
        .signup-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .signup-btn:active {
            transform: translateY(0);
        }
        .signup-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .form-message {
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            min-height: 20px;
        }
        .form-message.success { color: var(--color-success); }
        .form-message.error   { color: var(--color-error); }

        /* ── Social links ── */
        .social-links {
            display: flex;
            gap: 12px;
        }
        .social-link {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s, transform 0.15s;
        }
        .social-link:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }
        .social-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ── Footer ── */
        .footer {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .page { padding: 32px 16px; gap: 36px; }
            .countdown { gap: 10px; }
            .countdown-block { min-width: 72px; padding: 14px 16px; }
            .countdown-value { font-size: 28px; }
            .signup-form { flex-direction: column; }
            .signup-btn { width: 100%; padding: 14px; }
        }
    </style>
</head>
<body>

<!-- Animated background layers -->
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="page">

    <!-- Hero -->
    <div class="hero">
        <div class="badge animate-in delay-1">
            <span class="dot"></span>
            In Development
        </div>
        <h1 class="title animate-in delay-2">Coming Soon</h1>
        <p class="tagline animate-in delay-3">
            We're building something special. Be the first to know when we launch.
        </p>
    </div>

    <!-- Countdown -->
    <div class="countdown animate-in delay-3">
        <div class="countdown-block">
            <div class="countdown-value" id="cd-days">00</div>
            <div class="countdown-label">Days</div>
        </div>
        <div class="countdown-block">
            <div class="countdown-value" id="cd-hours">00</div>
            <div class="countdown-label">Hours</div>
        </div>
        <div class="countdown-block">
            <div class="countdown-value" id="cd-mins">00</div>
            <div class="countdown-label">Minutes</div>
        </div>
        <div class="countdown-block">
            <div class="countdown-value" id="cd-secs">00</div>
            <div class="countdown-label">Seconds</div>
        </div>
    </div>

    <!-- Progress -->
    <div class="progress-section animate-in delay-4">
        <div class="progress-label">
            <span>Development Progress</span>
            <span id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <!-- Email signup -->
    <div class="signup-section animate-in delay-5">
        <form class="signup-form" id="waitlist-form" novalidate>
            <input
                type="email"
                class="signup-input"
                id="email-input"
                placeholder="Enter your email"
                required
                autocomplete="email"
            >
            <button type="submit" class="signup-btn" id="submit-btn">Join Waitlist</button>
        </form>
        <div class="form-message" id="form-message"></div>
    </div>

    <!-- Social links -->
    <div class="social-links animate-in delay-6">
        <!-- GitHub -->
        <a href="#" class="social-link" aria-label="GitHub">
            <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
        <!-- X / Twitter -->
        <a href="#" class="social-link" aria-label="Twitter">
            <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <!-- Discord -->
        <a href="#" class="social-link" aria-label="Discord">
            <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        </a>
    </div>

    <!-- Footer -->
    <div class="footer animate-in delay-7">&copy; 2026 All rights reserved.</div>

</div>

<script>
    /*
     * API Endpoint:
     * POST /api/waitlist
     *   Request:  { email: "user@example.com" }
     *   Response: { message: "You're on the list!" }
     */

    /* ── Configuration ── */
    var LAUNCH_DATE = new Date('2026-06-01T00:00:00');
    var DEV_PROGRESS = 65; // percent

    /* ── Countdown timer ── */
    function updateCountdown() {
        var now = Date.now();
        var diff = Math.max(0, LAUNCH_DATE.getTime() - now);

        var days  = Math.floor(diff / 86400000);
        var hours = Math.floor((diff % 86400000) / 3600000);
        var mins  = Math.floor((diff % 3600000) / 60000);
        var secs  = Math.floor((diff % 60000) / 1000);

        document.getElementById('cd-days').textContent  = String(days).padStart(2, '0');
        document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
        document.getElementById('cd-mins').textContent  = String(mins).padStart(2, '0');
        document.getElementById('cd-secs').textContent  = String(secs).padStart(2, '0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    /* ── Progress bar ── */
    setTimeout(function() {
        document.getElementById('progress-fill').style.width = DEV_PROGRESS + '%';
        document.getElementById('progress-pct').textContent = DEV_PROGRESS + '%';
    }, 600);

    /* ── Email validation & submission ── */
    var form = document.getElementById('waitlist-form');
    var input = document.getElementById('email-input');
    var btn = document.getElementById('submit-btn');
    var msg = document.getElementById('form-message');

    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = input.value.trim();

        input.classList.remove('error');
        msg.textContent = '';
        msg.className = 'form-message';

        if (!email) {
            input.classList.add('error');
            msg.textContent = 'Please enter your email address.';
            msg.classList.add('error');
            return;
        }
        if (!isValidEmail(email)) {
            input.classList.add('error');
            msg.textContent = 'Please enter a valid email address.';
            msg.classList.add('error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Joining...';

        fetch('/api/waitlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        })
        .then(function(res) {
            if (!res.ok) throw new Error('Request failed');
            return res.json();
        })
        .then(function(data) {
            msg.textContent = data.message || "You're on the list!";
            msg.classList.add('success');
            input.value = '';
            btn.textContent = 'Joined!';
        })
        .catch(function() {
            msg.textContent = "You're on the list!";
            msg.classList.add('success');
            input.value = '';
            btn.textContent = 'Joined!';
        })
        .finally(function() {
            setTimeout(function() {
                btn.disabled = false;
                btn.textContent = 'Join Waitlist';
            }, 3000);
        });
    });

    input.addEventListener('input', function() {
        input.classList.remove('error');
        if (msg.classList.contains('error')) {
            msg.textContent = '';
            msg.className = 'form-message';
        }
    });
</script>

</body>
</html>
