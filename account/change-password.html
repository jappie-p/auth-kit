<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../theme.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 32px;
        }

        .header { text-align: center; margin-bottom: 32px; }

        .header .icon {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 12px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--accent-text);
        }

        .header h1 { font-size: 1.25rem; font-weight: 600; }
        .header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; }

        .form { display: flex; flex-direction: column; gap: 18px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }

        .form-group input {
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus { outline: none; border-color: var(--accent); }

        .strength-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 4px; overflow: hidden; }
        .strength-bar .bar { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }

        .requirements {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .req {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--badge-bg);
            color: var(--text-dim);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .req.met { color: var(--color-success); border-color: var(--color-success); background: rgba(34, 197, 94, 0.1); }

        .match-indicator {
            font-size: 0.75rem;
            margin-top: 4px;
            transition: color 0.2s;
        }

        .match-indicator.match { color: var(--color-success); }
        .match-indicator.no-match { color: var(--color-error); }

        .btn-primary {
            padding: 12px 20px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .alert {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            display: none;
        }

        .alert.show { display: block; }
        .alert.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--color-error); color: var(--color-error); }
        .alert.success { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--color-success); color: var(--color-success); }

        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: var(--text-muted); font-size: 0.8rem; text-decoration: none; }
        .back-link a:hover { color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="icon">&#128273;</div>
                <h1>Change Password</h1>
                <p>Enter your current password and choose a new one</p>
            </div>

            <form class="form" id="changeForm">
                <div class="alert" id="alert"></div>

                <div class="form-group">
                    <label for="currentPassword">Current Password</label>
                    <input type="password" id="currentPassword" required autocomplete="current-password">
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required autocomplete="new-password" maxlength="128">
                    <div class="strength-bar"><div class="bar" id="strengthBar"></div></div>
                    <div class="requirements">
                        <span class="req" data-req="length">8+ chars</span>
                        <span class="req" data-req="upper">Uppercase</span>
                        <span class="req" data-req="lower">Lowercase</span>
                        <span class="req" data-req="digit">Number</span>
                        <span class="req" data-req="special">Symbol</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required autocomplete="new-password" maxlength="128">
                    <div class="match-indicator" id="matchIndicator"></div>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Update Password</button>
            </form>

            <div class="back-link"><a href="/dashboard">Back to Dashboard</a></div>
        </div>
    </div>
    <script>
        const API_BASE = '/api';
        const REDIRECT = '/dashboard';

        const form = document.getElementById('changeForm');
        const alert = document.getElementById('alert');
        const submitBtn = document.getElementById('submitBtn');
        const strengthBar = document.getElementById('strengthBar');
        const matchIndicator = document.getElementById('matchIndicator');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');

        function showAlert(msg, type) {
            alert.textContent = msg;
            alert.className = 'alert show ' + type;
        }

        // Password strength
        newPassword.addEventListener('input', () => {
            const val = newPassword.value;
            const checks = {
                length: val.length >= 8,
                upper: /[A-Z]/.test(val),
                lower: /[a-z]/.test(val),
                digit: /\d/.test(val),
                special: /[^A-Za-z0-9]/.test(val)
            };

            let score = Object.values(checks).filter(Boolean).length;
            const colors = ['#ef4444', '#f59e0b', '#f59e0b', '#22c55e', '#22c55e'];
            strengthBar.style.width = (score / 5 * 100) + '%';
            strengthBar.style.background = colors[Math.min(score, 4)] || '#262626';

            document.querySelectorAll('.req').forEach(el => {
                el.classList.toggle('met', checks[el.dataset.req]);
            });

            checkMatch();
        });

        // Confirm match
        function checkMatch() {
            const val = confirmPassword.value;
            if (!val) { matchIndicator.textContent = ''; return; }
            if (val === newPassword.value) {
                matchIndicator.textContent = 'Passwords match';
                matchIndicator.className = 'match-indicator match';
            } else {
                matchIndicator.textContent = 'Passwords do not match';
                matchIndicator.className = 'match-indicator no-match';
            }
        }
        confirmPassword.addEventListener('input', checkMatch);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPass = newPassword.value;
            const confirmPass = confirmPassword.value;

            if (newPass !== confirmPass) {
                showAlert('Passwords do not match.', 'error');
                return;
            }

            if (newPass.length < 8) {
                showAlert('Password must be at least 8 characters.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const res = await fetch(`${API_BASE}/auth/change-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ current_password: currentPassword, new_password: newPass })
                });

                const data = await res.json();

                if (res.ok) {
                    showAlert('Password updated successfully.', 'success');
                    form.reset();
                    strengthBar.style.width = '0';
                    matchIndicator.textContent = '';
                    document.querySelectorAll('.req').forEach(el => el.classList.remove('met'));
                } else {
                    showAlert(data.error || 'Failed to update password.', 'error');
                }
            } catch {
                showAlert('Connection error. Try again.', 'error');
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Update Password';
        });
    </script>
</body>
</html>
