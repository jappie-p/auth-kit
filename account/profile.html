<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../theme.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 420px; padding: 20px; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 32px;
        }

        .header { text-align: center; margin-bottom: 28px; }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-text);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: opacity 0.2s;
        }

        .avatar:hover { opacity: 0.85; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .avatar-edit {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 0.6rem;
            padding: 4px 0;
            text-align: center;
            font-weight: 500;
        }

        .header h1 { font-size: 1.25rem; font-weight: 600; }
        .header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

        .form { display: flex; flex-direction: column; gap: 18px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }

        .form-group input {
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus { outline: none; border-color: var(--accent); }
        .form-group input:disabled { opacity: 0.5; cursor: not-allowed; }

        .form-group .hint {
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .btn-primary {
            padding: 12px 20px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .alert {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            display: none;
        }

        .alert.show { display: block; }
        .alert.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--color-error); color: var(--color-error); }
        .alert.success { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--color-success); color: var(--color-success); }

        .quick-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .quick-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .quick-link:hover { border-color: var(--border-hover); }
        .quick-link .arrow { color: var(--text-dim); }

        .danger-zone {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .danger-zone .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .btn-danger {
            padding: 10px 16px;
            background: transparent;
            color: var(--color-error);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); border-color: var(--color-error); }

        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: var(--text-muted); font-size: 0.8rem; text-decoration: none; }
        .back-link a:hover { color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="avatar" id="avatar" title="Change avatar">
                    <span id="avatarInitial">?</span>
                    <div class="avatar-edit">Edit</div>
                </div>
                <h1>Profile Settings</h1>
                <p>Manage your account information</p>
            </div>

            <form class="form" id="profileForm">
                <div class="alert" id="alert"></div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" disabled>
                    <span class="hint">Username cannot be changed</span>
                </div>

                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" maxlength="50">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" maxlength="100">
                </div>

                <button type="submit" class="btn-primary" id="saveBtn">Save Changes</button>
            </form>

            <div class="quick-links">
                <a href="change-password.html" class="quick-link">
                    <span>Change Password</span>
                    <span class="arrow">&#8250;</span>
                </a>
                <a href="setup-2fa.html" class="quick-link">
                    <span>Two-Factor Authentication</span>
                    <span class="arrow">&#8250;</span>
                </a>
                <a href="sessions.html" class="quick-link">
                    <span>Active Sessions</span>
                    <span class="arrow">&#8250;</span>
                </a>
            </div>

            <div class="danger-zone">
                <div class="label">Danger Zone</div>
                <button class="btn-danger" id="deleteBtn">Delete Account</button>
            </div>

            <div class="back-link"><a href="/dashboard">Back to Dashboard</a></div>
        </div>
    </div>
    <script>
        /**
         * PROFILE SETTINGS PAGE
         *
         * Server endpoints:
         * - GET  /api/auth/profile         → { username, display_name, email, avatar_url }
         * - PATCH /api/auth/profile        → { display_name, email }
         * - POST /api/auth/profile/avatar  → FormData with file
         * - POST /api/auth/delete-account  → { password }
         */

        const API_BASE = '/api';

        const alertEl = document.getElementById('alert');
        const avatarEl = document.getElementById('avatar');
        const avatarInitial = document.getElementById('avatarInitial');

        function showAlert(msg, type) {
            alertEl.textContent = msg;
            alertEl.className = 'alert show ' + type;
        }

        async function loadProfile() {
            try {
                const res = await fetch(`${API_BASE}/auth/profile`, { credentials: 'include' });
                const data = await res.json();

                document.getElementById('username').value = data.username || '';
                document.getElementById('displayName').value = data.display_name || '';
                document.getElementById('email').value = data.email || '';

                avatarInitial.textContent = (data.username || '?')[0].toUpperCase();

                if (data.avatar_url) {
                    const img = document.createElement('img');
                    img.src = data.avatar_url;
                    img.alt = 'Avatar';
                    avatarEl.innerHTML = '';
                    avatarEl.appendChild(img);
                    const edit = document.createElement('div');
                    edit.className = 'avatar-edit';
                    edit.textContent = 'Edit';
                    avatarEl.appendChild(edit);
                }
            } catch {
                showAlert('Failed to load profile.', 'error');
            }
        }

        // Save profile
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await fetch(`${API_BASE}/auth/profile`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        display_name: document.getElementById('displayName').value.trim(),
                        email: document.getElementById('email').value.trim()
                    })
                });

                if (res.ok) {
                    showAlert('Profile updated.', 'success');
                } else {
                    const data = await res.json();
                    showAlert(data.error || 'Failed to update profile.', 'error');
                }
            } catch {
                showAlert('Connection error.', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Save Changes';
        });

        // Avatar upload
        avatarEl.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.addEventListener('change', async () => {
                const file = input.files[0];
                if (!file) return;

                const form = new FormData();
                form.append('avatar', file);

                try {
                    const res = await fetch(`${API_BASE}/auth/profile/avatar`, {
                        method: 'POST',
                        credentials: 'include',
                        body: form
                    });

                    if (res.ok) {
                        loadProfile();
                        showAlert('Avatar updated.', 'success');
                    } else {
                        showAlert('Failed to upload avatar.', 'error');
                    }
                } catch {
                    showAlert('Upload failed.', 'error');
                }
            });
            input.click();
        });

        // Delete account
        document.getElementById('deleteBtn').addEventListener('click', async () => {
            const confirmed = confirm('Are you sure you want to delete your account? This cannot be undone.');
            if (!confirmed) return;

            const password = prompt('Enter your password to confirm:');
            if (!password) return;

            try {
                const res = await fetch(`${API_BASE}/auth/delete-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    const data = await res.json();
                    showAlert(data.error || 'Failed to delete account.', 'error');
                }
            } catch {
                showAlert('Connection error.', 'error');
            }
        });

        loadProfile();
    </script>
</body>
</html>
