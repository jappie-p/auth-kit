<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Strong</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../theme.css">
    <style>

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: #e5e5e5;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 420px; padding: 20px; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 32px;
        }

        .header { text-align: center; margin-bottom: 32px; }

        .header .logo {
            width: 48px; height: 48px;
            background: var(--accent);
            border-radius: 12px;
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 700; color: var(--accent-text);
        }

        .header h1 { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); }
        .header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; line-height: 1.5; }

        .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
        .step-dot.active { background: var(--accent); }
        .step-dot.done { background: var(--color-success); }

        .form { display: flex; flex-direction: column; gap: 18px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }

        .form-group input {
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus { outline: none; border-color: var(--accent); }
        .form-group input::placeholder { color: var(--text-dim); }

        .btn {
            padding: 12px 20px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .error, .success, .warning, .info {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            display: none;
        }

        .error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--color-error); color: var(--color-error); } /* rgba derives from --color-error */
        .success { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--color-success); color: var(--color-success); text-align: center; line-height: 1.5; } /* rgba derives from --color-success */
        .warning { background: rgba(245, 158, 11, 0.1); border: 1px solid var(--color-warning); color: var(--color-warning); } /* rgba derives from --color-warning */
        .info { background: rgba(168, 85, 247, 0.1); border: 1px solid var(--accent); color: var(--accent); text-align: center; line-height: 1.5; font-size: 0.8rem; } /* rgba derives from --accent */
        .error.show, .success.show, .warning.show, .info.show { display: block; }

        .countdown { font-weight: 600; }

        .verify-input {
            text-align: center; font-size: 1.4rem !important;
            letter-spacing: 0.4em; font-variant-numeric: tabular-nums;
        }

        .strength-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 4px; overflow: hidden; }
        .strength-bar .fill { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }

        .password-reqs { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 4px; }
        .password-reqs .req { font-size: 0.7rem; color: var(--text-dim); transition: color 0.2s; }
        .password-reqs .req.met { color: var(--color-success); }

        .match-indicator { font-size: 0.75rem; margin-top: 2px; display: none; }
        .match-indicator.show { display: block; }
        .match-indicator.match { color: var(--color-success); }
        .match-indicator.no-match { color: var(--color-error); }

        .resend-link { text-align: center; font-size: 0.8rem; color: var(--text-muted); }
        .resend-link a { color: var(--accent); text-decoration: none; cursor: pointer; }
        .resend-link a:hover { text-decoration: underline; }
        .resend-link a.disabled { color: var(--text-dim); pointer-events: none; }

        .attempts-left {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .back-link {
            text-align: center; margin-top: 20px;
            font-size: 0.85rem; color: var(--text-muted);
        }

        .back-link a { color: var(--accent); text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }

        .tier-badge {
            text-align: center; margin-top: 24px;
            font-size: 0.75rem; color: var(--text-dim);
        }

        .tier-badge span {
            background: var(--badge-bg); border: 1px solid var(--border);
            border-radius: 100px; padding: 4px 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">S</div>
                <h1>Reset Password</h1>
                <p>Secure password recovery</p>
            </div>

            <div class="step-indicator">
                <div class="step-dot active" id="dot1"></div>
                <div class="step-dot" id="dot2"></div>
                <div class="step-dot" id="dot3"></div>
            </div>

            <!-- Step 1: Request reset -->
            <form class="form" id="requestForm">
                <div class="error" id="requestError"></div>
                <div class="warning" id="requestWarning"></div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" autofocus maxlength="100">
                </div>

                <!-- Honeypot -->
                <div style="position: absolute; left: -9999px; opacity: 0; height: 0;">
                    <input type="text" name="website" tabindex="-1" autocomplete="off">
                </div>

                <button type="submit" class="btn" id="requestBtn">Send Reset Code</button>
            </form>

            <!-- Step 2: Enter code -->
            <form class="form" id="verifyForm" style="display: none;">
                <div class="error" id="verifyError"></div>

                <p style="text-align: center; color: #a3a3a3; font-size: 0.85rem; line-height: 1.5;">
                    Code sent to <strong id="sentToEmail" style="color: #fafafa;"></strong>
                </p>

                <div class="form-group">
                    <label for="resetCode">Reset Code</label>
                    <input type="text" id="resetCode" name="resetCode" required
                           placeholder="000000" maxlength="6" pattern="[0-9]{6}"
                           inputmode="numeric" class="verify-input">
                </div>

                <div class="attempts-left" id="attemptsLeft"></div>

                <button type="submit" class="btn" id="verifyBtn">Verify Code</button>

                <div class="resend-link">
                    <a href="#" id="resendLink">Resend code</a>
                </div>
            </form>

            <!-- Step 3: New password -->
            <form class="form" id="resetForm" style="display: none;">
                <div class="error" id="resetError"></div>
                <div class="success" id="resetSuccess"></div>

                <div class="info show">Code verified. Set your new password.</div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" required autocomplete="new-password" maxlength="128">
                    <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
                    <div class="password-reqs">
                        <span class="req" id="req-len">8+ chars</span>
                        <span class="req" id="req-upper">Uppercase</span>
                        <span class="req" id="req-lower">Lowercase</span>
                        <span class="req" id="req-num">Number</span>
                        <span class="req" id="req-special">Special</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" maxlength="128">
                    <div class="match-indicator" id="matchIndicator"></div>
                </div>

                <button type="submit" class="btn" id="resetBtn">Reset Password</button>
            </form>

            <div class="back-link">
                <a href="../3-strong.html">Back to login</a>
            </div>

            <div class="tier-badge"><span>Tier 3 — Strong</span></div>
        </div>
    </div>

    <script>
        /**
         * TIER 3 — STRONG FORGOT PASSWORD
         *
         * Features:
         * - 3-step: Request → Verify code → Set new password
         * - Honeypot field (bot trap)
         * - Rate limit handling (429 countdown)
         * - Code attempt tracking (max 5, with counter)
         * - Code expiry display (e.g. "Code expires in 10 minutes")
         * - Password strength + requirements + confirm match
         * - Resend with 60s cooldown
         * - Token-based code verification (separate step from password set)
         * - No email enumeration
         *
         * Server endpoints:
         * - POST /api/auth/forgot-password  → { email }
         *   Returns 200 always
         * - POST /api/auth/verify-reset     → { email, code }
         *   Returns { reset_token } or 400/429
         * - POST /api/auth/reset-password   → { reset_token, new_password }
         *   Returns 200 on success
         *
         * TODO: Set API_BASE below.
         */

        const API_BASE = '/api';
        const LOGIN_URL = '../3-strong.html';
        const MAX_CODE_ATTEMPTS = 5;

        let currentEmail = '';
        let resetToken = null;
        let codeAttempts = 0;
        let resendCooldown = 0;

        // ─── Steps ───

        function goToStep(step) {
            document.getElementById('requestForm').style.display = step === 1 ? 'flex' : 'none';
            document.getElementById('verifyForm').style.display = step === 2 ? 'flex' : 'none';
            document.getElementById('resetForm').style.display = step === 3 ? 'flex' : 'none';

            for (let i = 1; i <= 3; i++) {
                document.getElementById(`dot${i}`).className = 'step-dot' + (i < step ? ' done' : i === step ? ' active' : '');
            }
        }

        // ─── Password strength ───

        const reqs = {
            len: (v) => v.length >= 8,
            upper: (v) => /[A-Z]/.test(v),
            lower: (v) => /[a-z]/.test(v),
            num: (v) => /\d/.test(v),
            special: (v) => /[^A-Za-z0-9]/.test(v)
        };

        document.getElementById('newPassword').addEventListener('input', (e) => {
            const val = e.target.value;
            let score = 0;
            Object.entries(reqs).forEach(([key, fn]) => {
                const met = fn(val);
                if (met) score++;
                document.getElementById(`req-${key}`).classList.toggle('met', met);
            });
            const pct = val.length === 0 ? 0 : Math.min(score / 5 * 100, 100);
            const colors = ['#ef4444', '#f59e0b', '#f59e0b', '#22c55e', '#22c55e'];
            document.getElementById('strengthFill').style.width = pct + '%';
            document.getElementById('strengthFill').style.background = colors[Math.min(score, 4)] || '#262626';
            updateMatch();
        });

        function updateMatch() {
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const el = document.getElementById('matchIndicator');
            if (!confirm) { el.classList.remove('show'); return; }
            el.classList.add('show');
            if (pass === confirm) {
                el.textContent = 'Passwords match';
                el.className = 'match-indicator show match';
            } else {
                el.textContent = 'Passwords do not match';
                el.className = 'match-indicator show no-match';
            }
        }

        document.getElementById('confirmPassword').addEventListener('input', updateMatch);

        function showError(elId, msg) {
            const el = document.getElementById(elId);
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError(elId) {
            document.getElementById(elId).classList.remove('show');
        }

        // ─── Step 1: Request ───

        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError('requestError');
            document.getElementById('requestWarning').classList.remove('show');
            const btn = document.getElementById('requestBtn');

            const email = document.getElementById('email').value.trim();
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('requestError', 'Enter a valid email address.');
                return;
            }

            // Check honeypot
            const hp = document.querySelector('input[name="website"]');
            if (hp && hp.value) {
                await new Promise(r => setTimeout(r, 2000));
                currentEmail = email;
                document.getElementById('sentToEmail').textContent = email;
                goToStep(2);
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch(`${API_BASE}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (res.status === 429) {
                    const data = await res.json().catch(() => ({}));
                    const secs = data.retry_after || 60;
                    const warnEl = document.getElementById('requestWarning');
                    warnEl.classList.add('show');
                    let remaining = secs;
                    const timer = setInterval(() => {
                        remaining--;
                        if (remaining <= 0) {
                            clearInterval(timer);
                            warnEl.classList.remove('show');
                            btn.disabled = false;
                            btn.textContent = 'Send Reset Code';
                        } else {
                            warnEl.innerHTML = `Too many requests. Wait <span class="countdown">${remaining}s</span>`;
                        }
                    }, 1000);
                    warnEl.innerHTML = `Too many requests. Wait <span class="countdown">${remaining}s</span>`;
                    return;
                }

                currentEmail = email;
                document.getElementById('sentToEmail').textContent = email;
                goToStep(2);
                document.getElementById('resetCode').focus();
            } catch (err) {
                showError('requestError', 'Connection error. Try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Code';
            }
        });

        // ─── Step 2: Verify code ───

        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError('verifyError');
            const btn = document.getElementById('verifyBtn');

            const code = document.getElementById('resetCode').value.trim();
            if (code.length !== 6 || !/^\d{6}$/.test(code)) {
                showError('verifyError', 'Enter a valid 6-digit code.');
                return;
            }

            codeAttempts++;

            if (codeAttempts > MAX_CODE_ATTEMPTS) {
                showError('verifyError', 'Too many attempts. Request a new code.');
                return;
            }

            document.getElementById('attemptsLeft').textContent =
                `${MAX_CODE_ATTEMPTS - codeAttempts} attempt${MAX_CODE_ATTEMPTS - codeAttempts !== 1 ? 's' : ''} remaining`;

            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const res = await fetch(`${API_BASE}/auth/verify-reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, code })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError('verifyError', data.error || 'Invalid or expired code.');
                    document.getElementById('resetCode').value = '';
                    document.getElementById('resetCode').focus();
                    return;
                }

                resetToken = data.reset_token;
                goToStep(3);
                document.getElementById('newPassword').focus();
            } catch (err) {
                showError('verifyError', 'Connection error. Try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify Code';
            }
        });

        // Resend
        document.getElementById('resendLink').addEventListener('click', async (e) => {
            e.preventDefault();
            const link = e.target;
            if (resendCooldown > 0) return;
            link.classList.add('disabled');
            codeAttempts = 0;
            document.getElementById('attemptsLeft').textContent = '';

            try {
                await fetch(`${API_BASE}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail })
                });
            } catch { /* ignore */ }

            resendCooldown = 60;
            const timer = setInterval(() => {
                resendCooldown--;
                if (resendCooldown <= 0) {
                    clearInterval(timer);
                    link.textContent = 'Resend code';
                    link.classList.remove('disabled');
                } else {
                    link.textContent = `Resend code (${resendCooldown}s)`;
                }
            }, 1000);
            link.textContent = `Resend code (${resendCooldown}s)`;
        });

        // ─── Step 3: Set new password ───

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError('resetError');
            const btn = document.getElementById('resetBtn');

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 8) {
                showError('resetError', 'Password must be at least 8 characters.');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('resetError', 'Passwords do not match.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reset_token: resetToken, new_password: newPassword })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError('resetError', data.error || 'Reset failed. Try again.');
                    return;
                }

                const successEl = document.getElementById('resetSuccess');
                successEl.textContent = 'Password reset! Redirecting to login...';
                successEl.classList.add('show');
                document.getElementById('dot3').className = 'step-dot done';
                setTimeout(() => { window.location.href = LOGIN_URL; }, 2000);
            } catch (err) {
                showError('resetError', 'Connection error. Try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
